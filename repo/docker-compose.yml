services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - campuslearn

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    working_dir: /app
    networks:
      - campuslearn

  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: e2e-runner
    working_dir: /app
    environment:
      BASE_URL: "http://frontend:80"
    depends_on:
      - frontend
      - backend
    networks:
      - campuslearn

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "${APP_ENV:-local}"
      # Local default key allows zero-config startup; override for non-local usage.
      APP_KEY: "${APP_KEY:-base64:by5ipvlCVjyDmh4xxNGVm0m3vy3tv4JgAH36EUbMTGs=}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-campuslearn}"
      DB_USERNAME: "${DB_USERNAME:-campuslearn}"
      DB_PASSWORD: "${DB_PASSWORD:-campuslearn_local}"
      CACHE_STORE: "${CACHE_STORE:-file}"
      CACHE_DRIVER: "${CACHE_DRIVER:-file}"
      QUEUE_CONNECTION: database
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      SEED_DEMO_USERS: "${SEED_DEMO_USERS:-true}"
      BACKUP_ENCRYPTION_KEY: "${BACKUP_ENCRYPTION_KEY:-b7b5aa1b9da4d59a7c092c55005b0954dc1d18d2acba9d96256ad0adde12fe49}"
      DIAGNOSTIC_ENCRYPTION_KEY: "${DIAGNOSTIC_ENCRYPTION_KEY:-530998018beefe2cf9d3e61ada165dab23315ff683276f879fd3f36af8523d0e}"
    volumes:
      - backend_storage:/var/www/html/storage/app
      - backup_volume:/var/www/html/storage/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - campuslearn

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-campuslearn}"
      MYSQL_USER: "${DB_USERNAME:-campuslearn}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-campuslearn_local}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-campuslearn_root_local}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campuslearn

volumes:
  mysql_data:
  backend_storage:
  backup_volume:

networks:
  campuslearn:
    driver: bridge
